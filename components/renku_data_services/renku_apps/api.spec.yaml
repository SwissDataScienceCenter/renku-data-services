openapi: 3.0.2
info:
  title: Renku Data Services API
  description: |
    A service that allows users to manage apps on Renku.
  version: v1
servers:
  - url: /api/data
paths:
  /apps:
    post:
      summary: Launch a new app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppPostRequest"
      responses:
        "201":
          description: The app was created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse"
        default:
          $ref: "#/components/responses/Error"
      tags:
        - apps
  /apps/{app_name}:
    get:
      summary: Retrieve an app
      parameters:
        - in: path
          name: app_name
          required: true
          schema:
            $ref: "#/components/schemas/AppName"
          description: The name of the app to retrieve
      responses:
        "200":
          description: The app for the given name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse"
        default:
          $ref: "#/components/responses/Error"
      tags:
        - apps
components:
  schemas:
    Ulid:
      description: ULID identifier
      type: string
      minLength: 26
      maxLength: 26
      pattern: "^[0-7][0-9A-HJKMNP-TV-Z]{25}$"

    AppStatus:
      type: string
      enum:
        - pending
        - ready
        - failed

    AppName:
      type: string
      minLength: 5
      maxLength: 50
      pattern: "^[a-z]([-a-z0-9]*[a-z0-9])?$"
      example: d185e68d-d43-renku-2-b9ac279a4e8a85ac28d08

    AppResponse:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AppName"
        launcher_id:
          $ref: "#/components/schemas/Ulid"
        status:
          $ref: "#/components/schemas/AppStatus"
        url:
          type: string
          nullable: true
        project_id:
          $ref: "#/components/schemas/Ulid"
        started:
          type: string
          format: date-time
          nullable: true
        image:
          type: string
          nullable: true
      required:
        - name
        - launcher_id
        - status
        - project_id

    AppPostRequest:
      type: object
      properties:
        launcher_id:
          $ref: "#/components/schemas/Ulid"
      required:
        - launcher_id

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              minimum: 0
              exclusiveMinimum: true
              example: 1404
            detail:
              type: string
              example: A more detailed optional message showing what the problem was
            message:
              type: string
              example: Something went wrong - please try again later
            trace_id:
              description: Sentry trace ID for linking to corresponding log entries
              example: ac93950e9e114a55c67fb8e5ef519bbe
              type: string
          required:
            - code
            - message
      required:
        - error

  responses:
    Error:
      description: The schema for all 4xx and 5xx responses
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
