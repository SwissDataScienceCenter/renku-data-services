openapi: 3.0.2
info:
  title: Renku Data Services API
  description: |
    This service is the main backend for Renku. It provides information about users, projects,
    cloud storage, access to compute resources and many other things.
  version: v1
servers:
  - url: /api/data
paths:
  /persisted_logs/sessions/{launcher_id}:
    get:
      parameters:
        - in: path
          name: launcher_id
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "200":
          description: |
            The session logs from the corresponding run and container, paginated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersistedSessionLogs"
        "404":
          description: The session launcher does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
            $ref: "#/components/responses/Error"
  /persisted_logs/sessions/{launcher_id}/runs:
    get:
      parameters:
        - in: path
          name: launcher_id
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "200":
          description: |
            The session runs for which logs exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRuns"
        "404":
          description: The session launcher does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
            $ref: "#/components/responses/Error"
components:
  schemas:
    PersistedSessionLogs:
      description: Logs for a session
      type: object
      additionalProperties: true
    SessionRuns:
      description: A session run
      type: object
      additionalProperties: true
    Ulid:
      description: ULID identifier
      type: string
      minLength: 26
      maxLength: 26
      pattern: "^[0-7][0-9A-HJKMNP-TV-Z]{25}$" # This is case-insensitive
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              minimum: 0
              exclusiveMinimum: true
              example: 1404
            detail:
              type: string
              example: "A more detailed optional message showing what the problem was"
            message:
              type: string
              example: "Something went wrong - please try again later"
            trace_id:
              type: string
              example: "ac93950e9e114a55c67fb8e5ef519bbe"
              description: Sentry trace ID for linking to corresponding log entries
          required: ["code", "message"]
      required: ["error"]
  responses:
    Error:
      description: The schema for all 4xx and 5xx responses
      content:
        "application/json":
          schema:
            $ref: "#/components/schemas/ErrorResponse"
