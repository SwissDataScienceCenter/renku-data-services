---
apiVersion: shipwright.io/v1beta1
kind: BuildStrategy
metadata:
  name: renku-buildpacks-v3
spec:
  parameters:
    - name: platform-api-version
      description: The referenced version is the minimum version that all relevant buildpack implementations support.
      default: "0.15"
    - name: run-image
      description: The image to use as the base for all session images built with this strategy
      default: "ghcr.io/swissdatasciencecenter/renku-frontend-buildpacks/base-image:0.1.0"
    - name: builder-image
      description: The buildpack builder image to use
      default: "ghcr.io/swissdatasciencecenter/renku-frontend-buildpacks/selector:0.1.0"
    - name: frontend
      description: Which frontend should be used in the image. Either "jupyterlab" or "vscodium".
      default: vscodium
  steps:
    - name: build-and-push
      image: $(params.builder-image)
      imagePullPolicy: IfNotPresent
      env:
        - name: CNB_EXPERIMENTAL_MODE
          value: "warn"
        - name: CNB_PLATFORM_API
          value: $(params.platform-api-version)
        - name: BP_RENKU_FRONTENDS
          value: $(params.frontend)
        - name: PARAM_SOURCE_CONTEXT
          value: $(params.shp-source-context)
        - name: PARAM_OUTPUT_IMAGE
          value: $(params.shp-output-image)
        - name: PARAM_RUN_IMAGE
          value: $(params.run-image)
      command:
        - /bin/bash
      args:
        - -c
        - |
          set -euo pipefail

          echo "> Processing environment variables..."
          ENV_DIR="/platform/env"

          envs=($(env))

          # Denying the creation of non required files from system environments.
          # The creation of a file named PATH (corresponding to PATH system environment)
          # caused failure for python source during pip install (https://github.com/Azure-Samples/python-docs-hello-world)
          block_list=("PATH" "HOSTNAME" "PWD" "_" "SHLVL" "HOME" "")

          for env in "${envs[@]}"; do
            blocked=false

            IFS='=' read -r key value string <<< "$env"

            for str in "${block_list[@]}"; do
              if [[ "$key" == "$str" ]]; then
                blocked=true
                break
              fi
            done

            if [ "$blocked" == "false" ]; then
              path="${ENV_DIR}/${key}"
              echo -n "$value" > "$path"
            fi
          done

          LAYERS_DIR=/layers
          GENERATED_DIR="${LAYERS_DIR}/generated"

          echo "> Running analyzer..."
          /cnb/lifecycle/analyzer \
            -run-image=${PARAM_RUN_IMAGE} \
            ${PARAM_OUTPUT_IMAGE}

          echo "> Running detector..."
          /cnb/lifecycle/detector \
            -app=${PARAM_SOURCE_CONTEXT}

          echo "> Running restorer..."
          /cnb/lifecycle/restorer

          # Check if any extensions generated Dockerfiles
          HAS_BUILD_EXT=false
          HAS_RUN_EXT=false

          if [ -d "${GENERATED_DIR}/build" ] && \
             find "${GENERATED_DIR}/build" -name "Dockerfile" -print -quit | grep -q .; then
            HAS_BUILD_EXT=true
          fi

          if [ -d "${GENERATED_DIR}/run" ] && \
             find "${GENERATED_DIR}/run" -name "Dockerfile" -print -quit | grep -q .; then
            HAS_RUN_EXT=true
          fi

          if [ "${HAS_BUILD_EXT}" == "true" ]; then
            echo "> Extensions detected for build image. Running extender (build)..."
            /cnb/lifecycle/extender \
              -app=${PARAM_SOURCE_CONTEXT} \
              -kind=build
          else
            echo "> No build extensions detected. Running builder..."
            /cnb/lifecycle/builder \
              -app=${PARAM_SOURCE_CONTEXT}
          fi

          if [ "${HAS_RUN_EXT}" == "true" ]; then
            echo "> Extensions detected for run image. Running extender (run)..."
            /cnb/lifecycle/extender \
              -app=${PARAM_SOURCE_CONTEXT} \
              -kind=run
          fi

          echo "> Running exporter..."
          /cnb/lifecycle/exporter \
            -app=${PARAM_SOURCE_CONTEXT} \
            -report=/tmp/report.toml \
            ${PARAM_OUTPUT_IMAGE}
      volumeMounts:
        - mountPath: /platform/env
          name: platform-env
      resources:
        limits:
          cpu: 4000m
          memory: 8Gi
        requests:
          cpu: 2000m
          memory: 4Gi
  volumes:
    - name: platform-env
      emptyDir: {}
  securityContext:
    runAsUser: 1001
    runAsGroup: 1001
